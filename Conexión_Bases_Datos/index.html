<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <div class="container-fluid mt-4">
        <div id="row" class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="mt-3">
                            <label for="">Name: </label>
                            <input type="text" class="form-control" id="name">
                        </div>
                        <div class="mt-3">
                            <label for="">Correo: </label>
                            <input type="text" class="form-control" id="correo">
                        </div>
                        <button class="btn btn-primary w-100 mt-4" onclick="TieneID()">Enviar</button>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <input class="form-control" id="buscar" type="text" placeholder="Ingrese Dato a Buscar">
                <div class="table-responsive mt-3">
                    <table class="table table-hover border border-2 d-fle justify-content-center text-center">
                        <thead >
                            <tr >
                                <th class="border border-2 d-flex justify-content-center">ID</th>
                                <th class="border border-2">Nombre</th>
                                <th class="border border-2">Correo</th>
                                <th class="border border-2">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="userDetailsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="userDetailsModalLabel">Modal title</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="modalprueba">
            <p>Modal body text goes here.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div> 

</body>
</html>
